id: aws-credentials-file-exposed

info:
  name: AWS Credentials File Exposed
  author: hast
  severity: critical
  description: |
    An AWS credentials file is publicly accessible. This file contains AWS Access Key ID
    and Secret Access Key pairs which grant API access to AWS services. Depending on
    attached IAM policies this could allow full account takeover.
  remediation: |
    Remove the credentials file from web root immediately.
    Rotate compromised keys immediately in AWS IAM > Security Credentials.
    Use IAM roles instead of static credentials wherever possible.
  tags: aws,cloud,config,exposure,secrets,token

http:
  - method: GET
    path:
      - "{{BaseURL}}/.aws/credentials"
      - "{{BaseURL}}/aws-credentials.json"
      - "{{BaseURL}}/aws_credentials"

    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "aws_access_key_id"
          - "aws_secret_access_key"
          - "AWS_ACCESS_KEY"
        condition: or

    extractors:
      - type: regex
        name: access_key_id
        regex:
          - "aws_access_key_id\s*=\s*(AKIA[0-9A-Z]{16})"
          - "AWS_ACCESS_KEY_ID['\"]?\s*[:=]\s*['\"]?(AKIA[0-9A-Z]{16})"
