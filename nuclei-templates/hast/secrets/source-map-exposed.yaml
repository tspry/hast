id: js-source-map-exposed

info:
  name: JavaScript Source Map Exposed
  author: hast
  severity: medium
  description: |
    JavaScript source map (.js.map) files are publicly accessible. Source maps
    contain the original pre-minified/pre-compiled source code of the application.
    This exposes internal logic, API endpoints, authentication flows, hardcoded
    values, and developer comments that should not be visible in production.
  remediation: |
    Remove .js.map files from production deployments or block access via server rules.
    Configure your bundler (webpack/vite/rollup) to not emit source maps for production
    builds, or serve them only to authenticated users/specific IPs.
  tags: javascript,react,angular,vue,sourcemap,exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/static/js/main.chunk.js.map"
      - "{{BaseURL}}/static/js/bundle.js.map"
      - "{{BaseURL}}/js/app.js.map"
      - "{{BaseURL}}/js/main.js.map"
      - "{{BaseURL}}/assets/index.js.map"

    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "\"mappings\""
          - "\"sources\""
          - "\"sourcesContent\""
        condition: or

      - type: word
        words:
          - "\"version\":"
