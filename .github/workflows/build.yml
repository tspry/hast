name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
      push_to_registry:
        description: "Push image to GitHub Container Registry (ghcr.io)"
        required: true
        type: boolean
        default: true

env:
  IMAGE_NAME: hast-scanner
  REGISTRY: ghcr.io

jobs:
  # ── Build each arch separately so cache scopes never collide ──────────────────
  build-arch:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push_to_registry }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build, cache, and export tar — all in one step ────────────────────────
      # cache-from/to use a per-arch scope so layers never overwrite each other.
      # outputs exports the image to a local tar file (no docker daemon needed).
      - name: Build ${{ matrix.arch }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          outputs: type=docker,dest=/tmp/hast-${{ matrix.arch }}.tar
          cache-from: type=gha,scope=hast-${{ matrix.arch }}
          cache-to: type=gha,scope=hast-${{ matrix.arch }},mode=max

      # ── Push to registry (reuses the cached layers — no rebuild) ──────────────
      - name: Push ${{ matrix.arch }} image to registry
        if: ${{ inputs.push_to_registry }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}-${{ matrix.arch }}
          cache-from: type=gha,scope=hast-${{ matrix.arch }}
          cache-to: type=gha,scope=hast-${{ matrix.arch }},mode=max

      - name: Compress image to tar.gz
        run: gzip -c /tmp/hast-${{ matrix.arch }}.tar > hast-${{ inputs.version }}-docker-${{ matrix.arch }}.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: hast-${{ inputs.version }}-docker-${{ matrix.arch }}
          path: hast-${{ inputs.version }}-docker-${{ matrix.arch }}.tar.gz
          retention-days: 30

  # ── Merge arch images into a single multi-arch manifest ───────────────────────
  push-manifest:
    name: Push multi-arch manifest
    needs: build-arch
    runs-on: ubuntu-latest
    if: ${{ inputs.push_to_registry }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Combine the two per-arch images into one manifest (what users pull)
      - name: Create and push multi-arch manifest
        run: |
          BASE=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          docker buildx imagetools create \
            --tag ${BASE}:${{ inputs.version }} \
            --tag ${BASE}:latest \
            ${BASE}:${{ inputs.version }}-amd64 \
            ${BASE}:${{ inputs.version }}-arm64

      # ── Package source archive ─────────────────────────────────────────────────
      - name: Package source archive
        run: |
          zip -r hast-${{ inputs.version }}-source.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*.db" \
            --exclude "*.sqlite" \
            --exclude "hast.db" \
            --exclude ".env"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: hast-${{ inputs.version }}-source
          path: hast-${{ inputs.version }}-source.zip
          retention-days: 30

      # ── Download the arch tarballs built in the matrix job ────────────────────
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: hast-${{ inputs.version }}-docker-amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: hast-${{ inputs.version }}-docker-arm64

      # ── Create GitHub Release with all three files ────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: HAST ${{ inputs.version }}
          draft: false
          prerelease: false
          files: |
            hast-${{ inputs.version }}-docker-amd64.tar.gz
            hast-${{ inputs.version }}-docker-arm64.tar.gz
            hast-${{ inputs.version }}-source.zip
          body: |
            ## HAST — Hardening & Attack Surface Tester ${{ inputs.version }}

            ### Installation

            **Option 1 — Docker (recommended)**
            ```bash
            # Pull from registry (auto-selects your arch)
            docker pull ghcr.io/${{ github.repository_owner }}/hast-scanner:${{ inputs.version }}
            docker run -p 8765:8765 --cap-add NET_RAW \
              ghcr.io/${{ github.repository_owner }}/hast-scanner:${{ inputs.version }}

            # Or load from the downloaded tar.gz (pick amd64 or arm64)
            docker load < hast-${{ inputs.version }}-docker-amd64.tar.gz
            docker run -p 8765:8765 --cap-add NET_RAW hast-scanner:${{ inputs.version }}-amd64
            ```

            **Option 2 — Source**
            ```bash
            unzip hast-${{ inputs.version }}-source.zip
            cd hast
            ./start.sh
            ```

            ### Dashboard
            Open **http://localhost:8765** after starting.

            ### Supported platforms
            - `linux/amd64` — standard servers, most CI runners
            - `linux/arm64` — Apple Silicon Mac, Raspberry Pi, AWS Graviton

            ### Tools bundled in Docker image
            `nmap` · `nuclei` · `katana` · `gospider` · `hakrawler` · `gau` · `ffuf` · `trufflehog` · `gitleaks` · `wafw00f` · `whatweb` · `curl`
