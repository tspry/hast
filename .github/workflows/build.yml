name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
      push_to_registry:
        description: "Push image to GitHub Container Registry (ghcr.io)"
        required: true
        type: boolean
        default: true

env:
  IMAGE_NAME: hast-scanner
  REGISTRY: ghcr.io

jobs:
  # ── Build multi-arch Docker image ─────────────────────────────────────────────
  build:
    name: Build Docker Image (amd64 + arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to create GitHub Release
      packages: write       # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the amd64 runner emulate arm64 for the build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Log in to ghcr.io ────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push_to_registry }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive image tags ─────────────────────────────────────────────────────
      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest

      # ── Build multi-arch and push to ghcr.io ──────────────────────────────────
      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_to_registry }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Export amd64 image as downloadable tar.gz artifact ────────────────────
      # (docker save only works for a single arch — we export amd64 for the tarball)
      - name: Export amd64 Docker image to tar.gz
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.IMAGE_NAME }}:${{ inputs.version }}-amd64 .
          docker save ${{ env.IMAGE_NAME }}:${{ inputs.version }}-amd64 \
            | gzip > hast-${{ inputs.version }}-docker-amd64.tar.gz
          echo "amd64 size: $(du -sh hast-${{ inputs.version }}-docker-amd64.tar.gz | cut -f1)"

      - name: Export arm64 Docker image to tar.gz
        run: |
          docker build --platform linux/arm64 \
            -t ${{ env.IMAGE_NAME }}:${{ inputs.version }}-arm64 .
          docker save ${{ env.IMAGE_NAME }}:${{ inputs.version }}-arm64 \
            | gzip > hast-${{ inputs.version }}-docker-arm64.tar.gz
          echo "arm64 size: $(du -sh hast-${{ inputs.version }}-docker-arm64.tar.gz | cut -f1)"

      - name: Upload amd64 image artifact
        uses: actions/upload-artifact@v4
        with:
          name: hast-${{ inputs.version }}-docker-amd64
          path: hast-${{ inputs.version }}-docker-amd64.tar.gz
          retention-days: 30

      - name: Upload arm64 image artifact
        uses: actions/upload-artifact@v4
        with:
          name: hast-${{ inputs.version }}-docker-arm64
          path: hast-${{ inputs.version }}-docker-arm64.tar.gz
          retention-days: 30

      # ── Package source (no secrets, no DB) ────────────────────────────────────
      - name: Package source archive
        run: |
          zip -r hast-${{ inputs.version }}-source.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*.db" \
            --exclude "*.sqlite" \
            --exclude "hast.db" \
            --exclude ".env"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: hast-${{ inputs.version }}-source
          path: hast-${{ inputs.version }}-source.zip
          retention-days: 30

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: HAST ${{ inputs.version }}
          draft: false
          prerelease: false
          files: |
            hast-${{ inputs.version }}-docker-amd64.tar.gz
            hast-${{ inputs.version }}-docker-arm64.tar.gz
            hast-${{ inputs.version }}-source.zip
          body: |
            ## HAST — Hardening & Attack Surface Tester ${{ inputs.version }}

            ### Installation

            **Option 1 — Docker (recommended)**
            ```bash
            # Pull from registry (auto-selects your arch)
            docker pull ghcr.io/${{ github.repository_owner }}/hast-scanner:${{ inputs.version }}
            docker run -p 8765:8765 --cap-add NET_RAW \
              ghcr.io/${{ github.repository_owner }}/hast-scanner:${{ inputs.version }}

            # Or load from the downloaded tar.gz (pick amd64 or arm64)
            docker load < hast-${{ inputs.version }}-docker-amd64.tar.gz
            docker run -p 8765:8765 --cap-add NET_RAW hast-scanner:${{ inputs.version }}-amd64
            ```

            **Option 2 — Source**
            ```bash
            unzip hast-${{ inputs.version }}-source.zip
            cd hast
            ./start.sh
            ```

            ### Dashboard
            Open **http://localhost:8765** after starting.

            ### Supported platforms
            - `linux/amd64` — standard servers, most CI runners
            - `linux/arm64` — Apple Silicon Mac, Raspberry Pi, AWS Graviton

            ### Tools bundled in Docker image
            `nmap` · `nuclei` · `katana` · `gospider` · `hakrawler` · `gau` · `ffuf` · `trufflehog` · `gitleaks` · `wafw00f` · `whatweb` · `curl`
